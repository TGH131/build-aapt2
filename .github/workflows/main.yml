name: Build aapt2

on:
  push:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Install Repo
      run: |
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
    - name: Clone Source
      run: |
        repo init -u https://android.googlesource.com/platform/manifest -b master --partial-clone
        repo sync -c
      
    
